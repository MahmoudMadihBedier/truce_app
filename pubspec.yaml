name: truce_app
description: "Truce - Egypt's #1 Price Aggregator"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.7 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  equatable: ^2.0.5
  flutter_bloc: ^8.1.3
  get_it: ^7.6.4
  dio: ^5.3.3
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  google_sign_in: ^6.1.6
  animations: ^2.2.0
  flutter_animate: ^4.5.2
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.1
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  flutter_floating_bottom_bar: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lang/
